<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Docaa — Кабінет Лектора</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#151515;--bg2:#1c1c1c;--bg3:#242424;--bg4:#2c2c2c;
  --b1:#2a2a2a;--b2:#383838;--b3:#484848;
  --t1:#f0f0f0;--t2:#a0a0a0;--t3:#606060;--t4:#383838;
  --acc:#FFBE63;--acc2:#e8a845;--acc-bg:rgba(255,190,99,.08);--acc-br:rgba(255,190,99,.25);
  --grn:#34d87a;--grn2:#22a85a;--grn-bg:rgba(52,216,122,.08);
  --red:#f05060;--red2:#c03040;--red-bg:rgba(240,80,96,.08);
  --yel:#f0c040;--blue:#5090ff;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:7px;--r2:11px;--r3:15px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* SIDEBAR */
.sb-logo{height:52px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-user{padding:10px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:var(--t1)}
.sb-user-role{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.08em}
.nav{padding:6px;flex:1;overflow-y:auto;min-height:0}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--t3);font-size:13px;font-weight:500;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:var(--acc-bg);color:var(--t1);border:1px solid var(--acc-br)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{border-radius:10px;font-size:10px;font-family:var(--mono);font-weight:600;padding:1px 7px;background:var(--acc);color:#000}
.sb-bottom{padding:10px 12px;border-top:1px solid var(--b1);flex-shrink:0}

/* TOPBAR */
.topbar{height:48px;min-height:48px;display:flex;align-items:center;padding:0 18px;gap:10px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.tb-title{font-size:14px;font-weight:600;color:var(--t1)}
.tb-right{margin-left:auto;display:flex;gap:8px}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;min-height:0}
.page{flex:1;overflow-y:auto;padding:20px;min-height:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--b3)}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#000;font-weight:600}
.btn.primary:hover{background:var(--acc2)}
.btn.danger{background:var(--red2);border-color:var(--red2);color:#fff}
.btn.success{background:var(--grn2);border-color:var(--grn2);color:#fff}
.btn.sm{padding:5px 11px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn:disabled{opacity:.35;pointer-events:none}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--t3)}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.t-active{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(52,216,122,.25)}
.t-stopped{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,80,96,.25)}
.t-paused{background:rgba(240,192,64,.08);color:var(--yel);border:1px solid rgba(240,192,64,.25)}
.t-new{background:var(--bg4);color:var(--t3);border:1px solid var(--b1)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 12px;color:var(--t3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--b1)}
.tbl th.r{text-align:right}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--b1);vertical-align:middle}
.tbl td.r{text-align:right;font-family:var(--mono)}
.tbl tr:hover td{background:var(--bg3)}
.tbl tr:last-child td{border-bottom:none}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);font-weight:600;display:block;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);font-family:var(--sans);font-size:13px;padding:9px 11px;border-radius:var(--r);outline:none;transition:border-color .1s}
.form-input:focus{border-color:var(--acc)}
.form-input::placeholder{color:var(--t4)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r3);padding:26px;max-width:460px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:16px}

/* PROGRESS BAR */
.prog-bar{height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));border-radius:2px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-bottom:5px}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--t1)}
.kpi-val.acc{color:var(--acc)}.kpi-val.grn{color:var(--grn)}.kpi-val.red{color:var(--red)}

/* NOTIFICATION */
.notif{position:fixed;bottom:16px;right:16px;background:var(--bg4);border:1px solid var(--b2);border-radius:var(--r2);padding:10px 14px;font-size:13px;color:var(--t1);z-index:9999;max-width:300px;animation:fadeUp .2s ease}
.notif.ok{border-left:3px solid var(--grn)}.notif.err{border-left:3px solid var(--red)}.notif.warn{border-left:3px solid var(--acc)}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}

/* STUDENT DETAIL PANEL */
.detail-panel{width:380px;min-width:340px;border-left:1px solid var(--b1);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
.dp-head{padding:14px 16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:14px 16px}
.dp-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;margin:14px 0 8px}
.order-row{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;margin-bottom:7px}
.order-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.order-route{font-size:12px;font-weight:600}
.order-margin{font-family:var(--mono);font-size:12px;font-weight:600}
.order-margin.pos{color:var(--grn)}.order-margin.neg{color:var(--red)}.order-margin.pend{color:var(--t3)}
.order-cargo{font-size:11px;color:var(--t3)}

@media (max-width: 768px) {
  .sidebar { position:fixed;left:-220px;top:0;height:100vh;z-index:500;transition:left .25s;box-shadow:4px 0 20px rgba(0,0,0,.5); }
  .sidebar.open { left:0; }
  .main { width:100vw; }
  #mob-ov { display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499; }
  #mob-ov.show { display:block; }
  #mob-btn { display:block !important; }
  .kpi-row { grid-template-columns:repeat(2,1fr) !important; }
  .tbl { font-size:11px; }
  .tbl th,.tbl td { padding:6px 8px; }
  .modal-box { width:calc(100% - 20px) !important; max-width:unset !important; margin:10px; }
  .form-row { grid-template-columns:1fr !important; }
  .admin-stat-grid { grid-template-columns:repeat(2,1fr) !important; }
  /* Groups panel stacks */
  [style*="width:420px"] { width:100% !important; min-width:unset !important; border-left:none !important; border-top:1px solid var(--b1); }
  [style*="display:flex;flex:1;overflow:hidden"] { flex-direction:column !important; }
}

/* ─── GROUP DETAIL PAGE ─── */
.gdp-back-btn { padding:6px 12px; background:none; border:1px solid var(--b2); color:var(--t2); border-radius:var(--r); font-size:12px; cursor:pointer; font-family:inherit; }
.gdp-back-btn:hover { background:var(--bg3); color:var(--t1); }
.group-card { background:var(--bg2); border:1px solid var(--b1); border-radius:var(--r2); padding:18px 20px; margin-bottom:18px; }
.gc-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; gap:16px; }
.gc-title { font-size:18px; font-weight:600; margin-bottom:4px; }
.gc-meta { display:flex; gap:14px; font-size:11px; color:var(--t3); flex-wrap:wrap; }
.gc-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
.gc-stat { background:var(--bg3); border:1px solid var(--b1); border-radius:var(--r); padding:10px 12px; }
.gc-stat-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--t3); margin-bottom:4px; }
.gc-stat-val { font-size:18px; font-weight:600; font-family:var(--mono); }
.gc-stat-val.acc { color:var(--acc); }
.gc-stat-val.grn { color:var(--grn); }
.gc-actions { display:flex; gap:8px; flex-wrap:wrap; padding-top:14px; border-top:1px solid var(--b1); }
.section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-top:8px; }
.section-title { font-size:14px; font-weight:600; }
.section-sub { font-size:11px; color:var(--t3); }
.students-grid { display:flex; flex-direction:column; gap:8px; }
.st-card { background:var(--bg2); border:1px solid var(--b1); border-radius:var(--r2); overflow:hidden; }
.st-row { display:flex; align-items:center; padding:12px 16px; gap:14px; }
.st-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.st-status-dot.active { background:var(--grn); box-shadow:0 0 6px rgba(74,222,128,.5); }
.st-status-dot.stopped { background:var(--red); }
.st-status-dot.not-started { background:var(--t4); }
.st-status-dot.done { background:var(--acc); }
.st-info { flex:1; min-width:0; }
.st-name { font-size:13px; font-weight:500; margin-bottom:2px; }
.st-email { font-size:11px; color:var(--t3); font-family:var(--mono); }
.st-stats { display:flex; gap:18px; font-size:11px; color:var(--t3); align-items:center; flex-shrink:0; }
.st-stat { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
.st-stat-val { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--t1); }
.st-stat-val.acc { color:var(--acc); }
.st-stat-val.grn { color:var(--grn); }
.st-actions { display:flex; gap:5px; flex-shrink:0; }
.icon-btn { width:28px; height:28px; border-radius:var(--r); border:1px solid var(--b2); background:var(--bg3); color:var(--t2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; padding:0; }
.icon-btn:hover { background:var(--b1); color:var(--t1); }
.icon-btn.danger { color:var(--red); border-color:rgba(248,113,113,.3); }
.icon-btn.danger:hover { background:rgba(248,113,113,.1); }
.st-detail { display:none; border-top:1px solid var(--b1); background:var(--bg); padding:16px 18px; }
.st-card.expanded .st-detail { display:block; }
.st-card.expanded .expand-arrow { transform:rotate(180deg); }
.expand-arrow { transition:transform .15s; display:inline-block; }
.det-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.det-block-title { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--t3); font-weight:600; margin-bottom:8px; }
.orders-list { display:flex; flex-direction:column; gap:3px; }
.order-row { display:flex; align-items:center; gap:10px; padding:5px 8px; background:var(--bg2); border-radius:4px; font-size:11px; }
.order-id { font-family:var(--mono); color:var(--t3); width:42px; flex-shrink:0; }
.order-client { flex:1; color:var(--t2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.order-status-pill { padding:1px 6px; border-radius:3px; font-size:10px; font-weight:500; }
.os-new { background:rgba(96,165,250,.15); color:var(--blu, #60a5fa); }
.os-work { background:rgba(255,190,99,.15); color:var(--acc); }
.os-conf { background:rgba(74,222,128,.15); color:var(--grn); }
.os-done { background:var(--b1); color:var(--t3); }
.resume-block { margin-top:16px; background:var(--bg3); border:1px solid var(--b1); border-radius:var(--r); padding:14px 16px; }
.resume-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.resume-title { font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
.resume-empty { text-align:center; padding:20px 0; color:var(--t3); font-size:13px; }
.resume-empty-hint { font-size:11px; color:var(--t4); margin-top:6px; }
.resume-text { font-size:12px; line-height:1.6; color:var(--t2); white-space:pre-wrap; font-family:var(--mono); background:var(--bg); padding:12px; border-radius:var(--r); max-height:380px; overflow-y:auto; }
.resume-note { margin-top:12px; }
.resume-note-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--t3); font-weight:600; margin-bottom:6px; }
.resume-note textarea { width:100%; background:var(--bg); border:1px solid var(--b2); color:var(--t1); font-family:inherit; font-size:12px; padding:9px 11px; border-radius:var(--r); resize:vertical; min-height:60px; outline:none; line-height:1.5; box-sizing:border-box; }
.resume-note textarea:focus { border-color:var(--acc); }
.resume-actions { display:flex; justify-content:space-between; gap:8px; margin-top:10px; flex-wrap:wrap; }
.resume-actions-r { display:flex; gap:6px; }
.badge-locked { display:inline-block; padding:5px 10px; background:var(--bg); border:1px dashed var(--b2); border-radius:var(--r); font-size:11px; color:var(--t4); }
</style>
<script>window.addEventListener("resize",()=>{var b=document.getElementById("mob-btn");if(b)b.style.display=window.innerWidth<=768?"block":"none";});window.addEventListener("load",()=>{var b=document.getElementById("mob-btn");if(b)b.style.display=window.innerWidth<=768?"block":"none";});</script>

</head>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">

<script>
const API = '/api/lecturer';
let TOKEN = localStorage.getItem('docaa_token');
let USER  = JSON.parse(localStorage.getItem('docaa_user')||'null');
let STATE = { groups:[], selectedGroup:null, students:[], selectedStudent:null, letters:[] };

// ── AUTH CHECK ────────────────────────────────────────────────
if(!TOKEN||!USER){ location.href='/login.html'; }
if(USER.role==='student'){ location.href='/simulator.html'; }
if(USER.role==='superadmin'){ location.href='/superadmin.html'; }
document.getElementById('user-name').textContent = USER.name || 'Лектор';

async function api(method, path, body){
  const res = await fetch(API+path, {
    method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body: body ? JSON.stringify(body) : undefined
  });
  if(res.status===401){ logout(); return null; }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Server error '+res.status);
  return data;
}

// ── NAVIGATION ────────────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('n-'+page)?.classList.add('active');
  const titles={groups:'Групи та студенти',progress:'Прогрес студентів',letters:'Банк листів',rates:'Курс EUR/UAH'};
  // Reset tb-title (openGroupPage міг його замінити на складний HTML)
  document.getElementById('tb-title').textContent=titles[page]||page;
  STATE.selectedGroup=null;
  const renders={groups:renderGroups,progress:renderProgress,letters:renderLetters,rates:renderRates};
  (renders[page]||renderGroups)();
}

// ── GROUPS PAGE (список груп) ─────────────────────────────────
async function renderGroups(){
  document.getElementById('tb-right').innerHTML=`<button class="btn primary" onclick="document.getElementById('modal-group').style.display='flex'">+ Нова група</button>`;
  document.getElementById('content').innerHTML=`<div style="flex:1;overflow-y:auto;padding:18px" id="groups-main"></div>`;

  try{
    STATE.groups = await api('GET','/groups') || [];
    renderGroupsList();
  }catch(e){ notify(e.message,'err'); }
}

function renderGroupsList(){
  const el=document.getElementById('groups-main'); if(!el) return;
  if(!STATE.groups.length){
    el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3)">
      <div style="font-size:32px;margin-bottom:10px">👥</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">Груп ще немає</div>
      <div style="margin-bottom:16px">Створіть першу групу і додайте студентів</div>
      <button class="btn primary" onclick="document.getElementById('modal-group').style.display='flex'">+ Створити групу</button>
    </div>`;
    return;
  }
  el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">
    ${STATE.groups.map(g=>{
      const statusBadge = g.started_at
        ? `<span class="tag t-active">🟢 Триває</span>`
        : `<span class="tag t-new">🔵 Не розпочата</span>`;
      return `
      <div class="card" style="cursor:pointer;transition:border-color .15s"
        onmouseenter="this.style.borderColor='var(--acc)'"
        onmouseleave="this.style.borderColor='var(--b1)'"
        onclick="openGroupPage('${g.id}')">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
          <div class="card-title">${g.name}</div>
          <span style="font-size:10px;color:var(--t3)">${g.student_count||0} студ.</span>
        </div>
        ${g.notes?`<div class="card-sub">${g.notes}</div>`:''}
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${statusBadge}
          ${g.start_date?`<span style="font-size:11px;color:var(--t3)">Старт: ${g.start_date}</span>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── GROUP DETAIL PAGE (нова сторінка управління групою) ──────
async function openGroupPage(groupId){
  STATE.selectedGroup = STATE.groups.find(g=>g.id===groupId);
  if(!STATE.selectedGroup){ notify('Групу не знайдено','err'); return; }

  // Топбар з кнопкою назад
  document.getElementById('tb-right').innerHTML='';
  document.getElementById('tb-title').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px">
      <button class="gdp-back-btn" onclick="showPage('groups')">← Назад до груп</button>
      <div>
        <div style="font-size:14px;font-weight:600">${STATE.selectedGroup.name}</div>
        <div style="font-size:11px;color:var(--t3)">Управління групою та студентами</div>
      </div>
    </div>`;

  document.getElementById('content').innerHTML=`
    <div style="flex:1;overflow-y:auto;padding:22px" id="gdp-body">
      <div style="text-align:center;padding:40px;color:var(--t3)">
        <div class="spinner" style="margin:0 auto 10px"></div>
        Завантаження...
      </div>
    </div>`;

  try{
    STATE.students = await api('GET',`/groups/${groupId}/students`) || [];
    renderGroupDetail();
  }catch(e){ notify(e.message,'err'); }
}

function renderGroupDetail(){
  const g = STATE.selectedGroup;
  const students = STATE.students || [];
  const total = students.length;
  const active = students.filter(s=>s.sim_status==='active').length;
  const avgProfit = total ? Math.round(students.reduce((sum,s)=>sum+(s.profit||0),0)/total) : 0;
  const avgDay = total ? (students.reduce((sum,s)=>sum+(s.timer_day||0),0)/total).toFixed(1) : '—';

  const statusTag = g.started_at
    ? '<span class="tag t-active">🟢 Симуляція триває</span>'
    : '<span class="tag t-new">🔵 Не розпочата</span>';

  document.getElementById('gdp-body').innerHTML=`
    <!-- Group card -->
    <div class="group-card">
      <div class="gc-head">
        <div>
          <div class="gc-title">${g.name}</div>
          <div class="gc-meta">
            ${statusTag}
            ${g.start_date?`<span>Старт: ${g.start_date}</span>`:''}
            ${g.created_at?`<span>Створено: ${g.created_at.slice(0,10)}</span>`:''}
            ${g.notes?`<span>${g.notes}</span>`:''}
          </div>
        </div>
      </div>

      <div class="gc-stats">
        <div class="gc-stat">
          <div class="gc-stat-label">Студентів</div>
          <div class="gc-stat-val">${total}</div>
        </div>
        <div class="gc-stat">
          <div class="gc-stat-label">Активних</div>
          <div class="gc-stat-val grn">${active}</div>
        </div>
        <div class="gc-stat">
          <div class="gc-stat-label">Серед. день</div>
          <div class="gc-stat-val">${avgDay}/5</div>
        </div>
        <div class="gc-stat">
          <div class="gc-stat-label">Серед. прибуток</div>
          <div class="gc-stat-val acc">€${avgProfit}</div>
        </div>
      </div>

      <div class="gc-actions">
        ${g.started_at
          ? `<button class="btn" onclick="resetGroupStart('${g.id}')">🔄 Скинути старт</button>`
          : `<button class="btn primary" onclick="startGroup('${g.id}')">▶ Почати симуляцію</button>`}
        <button class="btn" onclick="openRatesModal('${g.id}')">💱 Курси EUR/UAH</button>
        <button class="btn" onclick="resetWholeGroup('${g.id}')">🔄 Рестарт всієї групи</button>
        <button class="btn primary" onclick="document.getElementById('modal-student').style.display='flex'">+ Додати студента</button>
      </div>
    </div>

    <!-- Students section -->
    <div class="section-head">
      <div>
        <div class="section-title">Студенти групи</div>
        <div class="section-sub">Натисніть ▾ щоб побачити деталі та резюме</div>
      </div>
    </div>

    <div class="students-grid" id="gdp-students"></div>`;

  renderStudentCards();
}

function renderStudentCards(){
  const cont = document.getElementById('gdp-students'); if(!cont) return;
  if(!STATE.students.length){
    cont.innerHTML=`<div style="text-align:center;padding:30px;color:var(--t3)">
      <div style="font-size:24px;margin-bottom:8px">👤</div>
      <div>Студентів ще немає</div>
      <div style="font-size:12px;margin-top:4px">Натисніть "+ Додати студента"</div>
    </div>`;
    return;
  }

  cont.innerHTML = STATE.students.map(st => {
    const status = st.sim_status || 'not-started';
    let dotCls = 'not-started';
    if(status==='active') dotCls='active';
    else if(status==='stopped') dotCls='stopped';
    else if(status==='completed' || (st.timer_day && st.timer_day>5)) dotCls='done';

    const isComplete = (st.timer_day || 0) > 5;
    const profit = st.profit ? '€'+st.profit : (status==='not-started'?'—':'€0');
    const day = st.timer_day ? `${st.timer_day} / 5` : '—';
    const orders = '—'; // буде завантажено в expand

    return `<div class="st-card" id="stc-${st.id}">
      <div class="st-row">
        <div class="st-status-dot ${dotCls}"></div>
        <div class="st-info">
          <div class="st-name">${st.name||'(без імені)'}</div>
          <div class="st-email">${st.email}</div>
        </div>
        <div class="st-stats">
          <div class="st-stat"><span>Прибуток</span><span class="st-stat-val acc">${profit}</span></div>
          <div class="st-stat"><span>День</span><span class="st-stat-val">${day}</span></div>
          <div class="st-stat"><span>Рейсів</span><span class="st-stat-val">${orders}</span></div>
        </div>
        <div class="st-actions">
          ${status==='active'
            ? `<button class="icon-btn" title="Зупинити" onclick="stopSession('${st.id}')">⏸</button>`
            : status==='stopped'
            ? `<button class="icon-btn" title="Відновити" onclick="resumeSession('${st.id}')">▶</button>`
            : `<button class="icon-btn" style="opacity:.3" disabled title="Неактивна">⏸</button>`}
          <button class="icon-btn danger" title="Рестарт сесії" onclick="if(confirm('Скинути прогрес студента?'))resetSession('${st.id}')">🔄</button>
          <button class="icon-btn" title="Розгорнути" onclick="toggleStudentDetail('${st.id}')"><span class="expand-arrow">▾</span></button>
        </div>
      </div>
      <div class="st-detail" id="std-${st.id}"></div>
    </div>`;
  }).join('');
}

async function toggleStudentDetail(studentId){
  const card = document.getElementById('stc-'+studentId);
  if(!card) return;
  if(card.classList.contains('expanded')){
    card.classList.remove('expanded');
    return;
  }
  card.classList.add('expanded');
  const det = document.getElementById('std-'+studentId);
  det.innerHTML=`<div style="padding:14px 0;text-align:center;color:var(--t3)"><div class="spinner" style="margin:0 auto 8px"></div>Завантаження деталей...</div>`;

  try{
    const data = await api('GET',`/students/${studentId}/details`);
    renderStudentDetail(studentId, data);
  }catch(e){

async function renderStudentDetail(studentId, data){
  const det = document.getElementById('std-'+studentId);
  if(!det) return;

  if(!data.session){
    det.innerHTML=`<div style="padding:14px 0;text-align:center;color:var(--t3)">Студент ще не починав симуляцію</div>`;
    return;
  }

  // Оновлюємо лічильники в шапці картки
  const card = document.getElementById('stc-'+studentId);
  if(card){
    const stats = card.querySelector('.st-stats');
    if(stats){
      const closed = data.metrics?.closed || 0;
      const valEls = stats.querySelectorAll('.st-stat-val');
      if(valEls[2]) valEls[2].innerHTML = `${closed} / 8`;
    }
  }

  const orderStatusName = { new:'новий', work:'в роботі', confirmed:'підтверджено', done:'виконано' };
  const orderStatusClass = { new:'os-new', work:'os-work', confirmed:'os-conf', done:'os-done' };
  const ordersHtml = data.orders.map((o,i)=>{
    const cls = orderStatusClass[o.status] || 'os-new';
    const name = orderStatusName[o.status] || o.status;
    const marginPart = (o.margin!=null) ? ` €${o.margin}` : '';
    const dir = o.dirs.join('→');
    return `<div class="order-row">
      <span class="order-id">#${String(i+1).padStart(2,'0')}</span>
      <span class="order-client">${o.company||o.from||'—'} (${dir})</span>
      <span class="order-status-pill ${cls}">${name}${marginPart}</span>
    </div>`;
  }).join('');

  const m = data.metrics || {};
  const isComplete = m.is_complete;

  det.innerHTML=`
    <div class="det-grid">
      <div>
        <div class="det-block-title">${data.orders.length} рейсів</div>
        <div class="orders-list">${ordersHtml || '<div style="color:var(--t4);font-size:11px">Немає рейсів</div>'}</div>
      </div>
      <div>
        <div class="det-block-title">Активність</div>
        <div style="background:var(--bg2);padding:12px;border-radius:var(--r);font-size:12px;line-height:1.8;color:var(--t2)">
          <div>Закрито рейсів: <strong style="color:var(--t1)">${m.closed}/${m.total}</strong></div>
          <div>Прибуток: <strong style="color:var(--acc)">€${m.profit}</strong></div>
          <div>Виручка: <strong style="color:var(--t1)">€${m.revenue}</strong></div>
          <div>Середня маржа: <strong style="color:var(--acc)">${m.avg_margin_pct}%</strong></div>
          <div>Імейл-тредів: <strong style="color:var(--t1)">${m.email_threads}</strong></div>
          <div>Чатів з перевізниками: <strong style="color:var(--t1)">${m.carrier_chats}</strong></div>
          <div>Поточний день: <strong style="color:var(--t1)">${m.timer_day}/5</strong></div>
        </div>
      </div>
    </div>
    <div id="resume-${studentId}"></div>`;

  // Резюме
  renderResumeBlock(studentId, isComplete);
}

async function renderResumeBlock(studentId, isComplete){
  const cont = document.getElementById('resume-'+studentId);
  if(!cont) return;

  if(!isComplete){
    cont.innerHTML=`
      <div class="resume-block">
        <div class="resume-empty">
          🔒 Резюме недоступне
          <div class="resume-empty-hint">Доступне після завершення симуляції (5 днів пройдено або всі 8 рейсів закрито)</div>
        </div>
      </div>`;
    return;
  }

  cont.innerHTML=`
    <div class="resume-block">
      <div class="resume-empty">
        <div class="spinner" style="margin:0 auto 10px"></div>
        Перевірка резюме...
      </div>
    </div>`;

  try{
    const summary = await api('GET',`/students/${studentId}/summary`);
    if(!summary.exists){
      cont.innerHTML=`
        <div class="resume-block">
          <div class="resume-empty">
            🤖 Резюме ще не згенеровано
            <div class="resume-empty-hint">Симуляція завершена. Можна згенерувати аналіз AI.</div>
            <div style="margin-top:14px">
              <button class="btn primary" onclick="generateSummary('${studentId}')">🤖 Згенерувати резюме</button>
            </div>
          </div>
        </div>`;
    }else{
      renderResumeFull(studentId, summary);
    }
  }catch(e){
    cont.innerHTML=`<div class="resume-block"><div class="resume-empty" style="color:var(--red)">Помилка: ${e.message}</div></div>`;
  }
}

function renderResumeFull(studentId, summary){
  const cont = document.getElementById('resume-'+studentId);
  if(!cont) return;
  const genDate = summary.generated_at ? new Date(summary.generated_at).toLocaleString('uk-UA') : '';
  // Безпечне відображення тексту резюме
  const safeText = escapeHtml(summary.ai_text||'');
  // Виділяємо рядки що починаються з нумерації або заголовків — жирним
  const stylized = safeText.replace(/^(📊|✅|⚠️|🌟|📈|💬|🎓|👤)([^\n]*)$/gm, '<strong>$1$2</strong>');

  cont.innerHTML=`
    <div class="resume-block">
      <div class="resume-head">
        <div class="resume-title">🤖 AI-резюме симуляції</div>
        ${genDate ? `<div style="font-size:11px;color:var(--t3)">Згенеровано ${genDate}</div>` : ''}
      </div>
      <div class="resume-text">${stylized}</div>

      <div class="resume-note">
        <div class="resume-note-label">📝 Коментар лектора</div>
        <textarea id="note-${studentId}" placeholder="Ваш персональний коментар студенту — буде додано до резюме при надсиланні (на майбутнє)">${escapeHtml(summary.lecturer_note||'')}</textarea>
      </div>

      <div class="resume-actions">
        <button class="btn sm danger" onclick="regenerateSummary('${studentId}')">🔄 Перегенерувати AI</button>
        <div class="resume-actions-r">
          <button class="btn sm" onclick="copySummary('${studentId}')">📋 Копіювати</button>
          <button class="btn sm primary" onclick="saveNote('${studentId}')">💾 Зберегти коментар</button>
          <span class="badge-locked" title="Буде реалізовано пізніше — резюме з'являться у студента в кабінеті">📨 Надіслати студенту (скоро)</span>
        </div>
      </div>
    </div>`;
}

function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function generateSummary(studentId){
  const cont = document.getElementById('resume-'+studentId);
  if(!cont) return;
  cont.innerHTML=`
    <div class="resume-block">
      <div class="resume-empty">
        <div class="spinner" style="margin:0 auto 12px"></div>
        🤖 AI генерує резюме... це може зайняти 20-40 секунд
        <div class="resume-empty-hint">Не закривайте сторінку</div>
      </div>
    </div>`;
  try{
    const summary = await api('POST',`/students/${studentId}/summary/generate`);
    renderResumeFull(studentId, {
      ai_text: summary.ai_text,
      lecturer_note: summary.lecturer_note,
      generated_at: summary.generated_at,
    });
    notify('Резюме згенеровано ✓','ok');
  }catch(e){
    if(e.message==='simulation_not_complete'){
      notify('Симуляція ще не завершена','err');
    }else{
      notify('Помилка генерації: '+e.message,'err');
    }
    renderResumeBlock(studentId, true);
  }
}

async function regenerateSummary(studentId){
  if(!confirm('Перегенерувати AI-резюме? Поточний AI-текст буде втрачено. Коментар лектора залишиться.')) return;
  await generateSummary(studentId);
}

async function saveNote(studentId){
  const ta = document.getElementById('note-'+studentId);

  try{

function copySummary(studentId){
  const cont = document.getElementById('resume-'+studentId);
  if(!cont) return;
  const text = cont.querySelector('.resume-text')?.innerText || '';
  const note = document.getElementById('note-'+studentId)?.value || '';
  const full = text + (note ? '\n\n──── КОМЕНТАР ЛЕКТОРА ────\n'+note : '');
  navigator.clipboard.writeText(full).then(
    ()=>notify('Скопійовано в буфер ✓','ok'),
    ()=>notify('Не вдалось скопіювати','err')
  );
}

        <div class="kpi"><div class="kpi-label">Сер. прибуток</div><div class="kpi-val acc">€${Math.round(students.reduce((s,st)=>s+(st.profit||0),0)/students.length)||0}</div></div>

          <th>Прогрес</th>

            const status=st.sim_status||'new';
            const stTag={active:'t-active',stopped:'t-stopped',paused:'t-paused',new:'t-new',completed:'t-active'}[status]||'t-new';
            const stLbl={active:'Активна',stopped:'Зупинено',paused:'Пауза',new:'Не розпочато',completed:'Завершено'}[status]||status;
            return `<tr>
              <td style="font-weight:500">${st.name}</td>

                  ${status==='active'
                    ?`<button class="btn xs danger" onclick="stopStudentFromProgress('${st.id}','${groupId}')">Стоп</button>`
                    :status==='stopped'
                    ?`<button class="btn xs success" onclick="resumeStudentFromProgress('${st.id}','${groupId}')">▶</button>`:''}

              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
        <div style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--acc)">€${data.session?.profit||0}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">Прибуток</div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--t1)">День ${data.session?.timer_day||1}/5</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">Поточний день</div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--grn)">${orders.filter(o=>o.carrier_id).length}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">Підтверджено</div>
        </div>
      </div>
      <table class="tbl">
        <thead><tr>
          <th>Замовлення</th><th class="r">Клієнт €</th><th class="r">Перевізн. €</th><th class="r">Маржа</th>
        </tr></thead>
        <tbody>
          ${orders.length ? orders.map(o=>{
            const m=o.client_freight&&o.carrier_freight?o.client_freight-o.carrier_freight:null;
            return `<tr>
              <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${o.letter_id.slice(-6)}</td>
              <td class="r">${o.client_freight?'€'+o.client_freight:'—'}</td>
              <td class="r">${o.carrier_freight?'€'+o.carrier_freight:'—'}</td>
              <td class="r" style="font-weight:600;color:${m===null?'var(--t3)':m>0?'var(--grn)':'var(--red)'}">${m===null?'—':'€'+m}</td>
            </tr>`;
          }).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--t3);padding:16px">Немає підтверджених замовлень</td></tr>'}
        </tbody>
      </table>
    </div>`;
    document.body.appendChild(mo);
  }catch(e){ notify(e.message,'err'); }
}

// ── LETTERS PAGE ──────────────────────────────────────────────
async function renderLetters(){
  document.getElementById('tb-right').innerHTML='';
  document.getElementById('content').innerHTML=`
    <div style="flex:1;overflow-y:auto;padding:18px" id="letters-content">
      <div style="text-align:center;color:var(--t3);padding:20px"><div class="spinner" style="margin:0 auto 10px"></div></div>
    </div>`;
  try{
    STATE.letters = await api('GET','/letters')||[];
    const el=document.getElementById('letters-content'); if(!el) return;
    const byType={complete:[],missing:[],form:[]};
    STATE.letters.forEach(l=>byType[l.type]?.push(l));
    const typeNames={complete:'Повна інформація',missing:'Неповна інформація',form:'Заявка'};
    el.innerHTML=Object.entries(byType).map(([type,letters])=>!letters.length?'':
      `<div style="margin-bottom:20px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;margin-bottom:10px">${typeNames[type]} (${letters.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">
          ${letters.map(l=>`
            <div class="card" style="padding:12px">
              <div style="display:flex;gap:8px;align-items:start;margin-bottom:6px">
                <span style="font-size:11px;font-family:var(--mono);background:var(--bg4);padding:2px 7px;border-radius:4px;color:var(--acc)">${(JSON.parse(l.dirs||'[]')).join('→')}</span>
                <span style="font-size:11px;color:var(--t3)">${l.vehicle||'—'}</span>
                <span style="margin-left:auto;font-size:10px;color:${l.active?'var(--grn)':'var(--red)'}">${l.active?'Активний':'Вимкнено'}</span>
              </div>
              <div style="font-size:12px;font-weight:500;margin-bottom:2px">${l.from_name} — ${l.company}</div>
              <div style="font-size:11px;color:var(--t3)">${l.subject}</div>
            </div>`).join('')}
        </div>
      </div>`
    ).join('');
    if(!STATE.letters.length){
      el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3)">
        <div style="font-size:28px;margin-bottom:10px">✉</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">Банк листів порожній</div>
        <div>Запустіть: <code style="background:var(--bg4);padding:2px 8px;border-radius:4px;font-family:var(--mono)">node scripts/seed-letters.js</code></div>
      </div>`;
    }
  }catch(e){ notify(e.message,'err'); }
}

// ── RATES PAGE ────────────────────────────────────────────────
async function renderRates(){
  document.getElementById('tb-right').innerHTML=`<button class="btn primary" onclick="saveRates()">💾 Зберегти курси</button>`;
  // Підвантажимо групи якщо ще немає
  if(!STATE.groups || !STATE.groups.length){
    try{ STATE.groups = await api('GET','/groups')||[]; }catch(e){}
  }
  if(!STATE.groups.length){
    document.getElementById('content').innerHTML=`
      <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--t3)">
        <div style="font-size:32px">💱</div>
        <div>Спочатку створіть групу — курси задаються для конкретної групи</div>
      </div>`;
    return;
  }
  // За замовчуванням — перша група або обрана
  if(!STATE.ratesGroupId) STATE.ratesGroupId = STATE.selectedGroup?.id || STATE.groups[0].id;

  const renderGroupSelect = () => STATE.groups.map(g=>
    `<option value="${g.id}" ${g.id===STATE.ratesGroupId?'selected':''}>${g.name}</option>`
  ).join('');

  document.getElementById('content').innerHTML=`
    <div style="flex:1;overflow-y:auto;padding:18px;max-width:540px">
      <div class="card" style="margin-bottom:14px">
        <div class="card-title" style="margin-bottom:4px">Курс EUR/UAH по днях симуляції</div>
        <div class="card-sub" style="margin-bottom:14px">Студенти бачать ці курси у календарі. Редагування — тільки лектор.</div>
        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label">Група</label>
          <select class="form-input" id="rates-group-select" onchange="onRatesGroupChange(this.value)">
            ${renderGroupSelect()}
          </select>
        </div>
        <div id="rates-inputs"></div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">Де відображається</div>
        <div class="card-sub">У сайдбарі симулятора студента — у міні-календарі. Клік на день показує курс цього дня. Використовується для розрахунку гривневих сум для українських замовників.</div>
      </div>
    </div>`;

  await loadRatesForGroup(STATE.ratesGroupId);
}

async function loadRatesForGroup(groupId){
  let rates=[41.5,41.65,41.8,41.7,41.9]; // default
  try{
    const r=await api('GET',`/groups/${groupId}/rates`);
    if(r && Array.isArray(r.rates) && r.rates.length===5) rates=r.rates;
  }catch(e){}
  const cont=document.getElementById('rates-inputs');
  if(!cont) return;
  cont.innerHTML=[1,2,3,4,5].map((d,i)=>`
    <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--b1)">
      <div style="width:64px;font-size:13px;font-weight:500">День ${d}</div>
      <input id="rate-${d}" type="number" step="0.01" class="form-input" style="width:120px" value="${rates[i].toFixed(2)}">
      <span style="font-size:13px;color:var(--t3)">грн / EUR</span>
    </div>`).join('');
}

function onRatesGroupChange(groupId){
  STATE.ratesGroupId=groupId;
  loadRatesForGroup(groupId);
}

async function saveRates(){
  const rates=[1,2,3,4,5].map(d=>parseFloat(document.getElementById('rate-'+d)?.value||0));
  if(rates.some(r=>!r||r<10)){ notify('Введіть правильні курси для всіх 5 днів (>= 10)','err'); return; }
  if(!STATE.ratesGroupId){ notify('Спочатку оберіть групу','err'); return; }
  try{
    await api('POST',`/groups/${STATE.ratesGroupId}/rates`,{rates});
    notify('Курси збережено ✓','ok');
  }catch(e){ notify(e.message,'err'); }
}

// ── UTILS ─────────────────────────────────────────────────────
function notify(msg, type=''){
  const el=document.createElement('div');
  el.className='notif '+(type==='ok'?'ok':type==='err'?'err':'warn');
  el.textContent=msg; document.body.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function logout(){
  try {
    localStorage.clear();
    sessionStorage.clear();
  } catch(e) {}
  location.href='/login.html';
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', async()=>{
  try{
    STATE.groups = await api('GET','/groups')||[];
  }catch(e){}
  showPage('groups');
});
</script>
</body>
</html>
