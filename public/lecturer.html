<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Docaa — Кабінет Лектора</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#151515;--bg2:#1c1c1c;--bg3:#242424;--bg4:#2c2c2c;
  --b1:#2a2a2a;--b2:#383838;--b3:#484848;
  --t1:#f0f0f0;--t2:#a0a0a0;--t3:#606060;--t4:#383838;
  --acc:#FFBE63;--acc2:#e8a845;--acc-bg:rgba(255,190,99,.08);--acc-br:rgba(255,190,99,.25);
  --grn:#34d87a;--grn2:#22a85a;--grn-bg:rgba(52,216,122,.08);
  --red:#f05060;--red2:#c03040;--red-bg:rgba(240,80,96,.08);
  --yel:#f0c040;--blue:#5090ff;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:7px;--r2:11px;--r3:15px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* SIDEBAR */
.sb-logo{height:52px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-user{padding:10px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:var(--t1)}
.sb-user-role{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.08em}
.nav{padding:6px;flex:1;overflow-y:auto;min-height:0}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:var(--t3);font-size:13px;font-weight:500;transition:all .1s;margin-bottom:1px}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:var(--acc-bg);color:var(--t1);border:1px solid var(--acc-br)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{border-radius:10px;font-size:10px;font-family:var(--mono);font-weight:600;padding:1px 7px;background:var(--acc);color:#000}
.sb-bottom{padding:10px 12px;border-top:1px solid var(--b1);flex-shrink:0}

/* TOPBAR */
.topbar{height:48px;min-height:48px;display:flex;align-items:center;padding:0 18px;gap:10px;background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.tb-title{font-size:14px;font-weight:600;color:var(--t1)}
.tb-right{margin-left:auto;display:flex;gap:8px}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;min-height:0}
.page{flex:1;overflow-y:auto;padding:20px;min-height:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--b3)}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#000;font-weight:600}
.btn.primary:hover{background:var(--acc2)}
.btn.danger{background:var(--red2);border-color:var(--red2);color:#fff}
.btn.success{background:var(--grn2);border-color:var(--grn2);color:#fff}
.btn.sm{padding:5px 11px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn:disabled{opacity:.35;pointer-events:none}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--t3)}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.t-active{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(52,216,122,.25)}
.t-stopped{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,80,96,.25)}
.t-paused{background:rgba(240,192,64,.08);color:var(--yel);border:1px solid rgba(240,192,64,.25)}
.t-new{background:var(--bg4);color:var(--t3);border:1px solid var(--b1)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 12px;color:var(--t3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--b1)}
.tbl th.r{text-align:right}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--b1);vertical-align:middle}
.tbl td.r{text-align:right;font-family:var(--mono)}
.tbl tr:hover td{background:var(--bg3)}
.tbl tr:last-child td{border-bottom:none}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);font-weight:600;display:block;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);font-family:var(--sans);font-size:13px;padding:9px 11px;border-radius:var(--r);outline:none;transition:border-color .1s}
.form-input:focus{border-color:var(--acc)}
.form-input::placeholder{color:var(--t4)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r3);padding:26px;max-width:460px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:16px}

/* PROGRESS BAR */
.prog-bar{height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));border-radius:2px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-bottom:5px}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--t1)}
.kpi-val.acc{color:var(--acc)}.kpi-val.grn{color:var(--grn)}.kpi-val.red{color:var(--red)}

/* NOTIFICATION */
.notif{position:fixed;bottom:16px;right:16px;background:var(--bg4);border:1px solid var(--b2);border-radius:var(--r2);padding:10px 14px;font-size:13px;color:var(--t1);z-index:9999;max-width:300px;animation:fadeUp .2s ease}
.notif.ok{border-left:3px solid var(--grn)}.notif.err{border-left:3px solid var(--red)}.notif.warn{border-left:3px solid var(--acc)}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}

/* STUDENT DETAIL PANEL */
.detail-panel{width:380px;min-width:340px;border-left:1px solid var(--b1);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
.dp-head{padding:14px 16px;border-bottom:1px solid var(--b1);flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:14px 16px}
.dp-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;margin:14px 0 8px}
.order-row{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;margin-bottom:7px}
.order-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.order-route{font-size:12px;font-weight:600}
.order-margin{font-family:var(--mono);font-size:12px;font-weight:600}
.order-margin.pos{color:var(--grn)}.order-margin.neg{color:var(--red)}.order-margin.pend{color:var(--t3)}
.order-cargo{font-size:11px;color:var(--t3)}

@media (max-width: 768px) {
  .sidebar { position:fixed;left:-220px;top:0;height:100vh;z-index:500;transition:left .25s;box-shadow:4px 0 20px rgba(0,0,0,.5); }
  .sidebar.open { left:0; }
  .main { width:100vw; }
  #mob-ov { display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499; }
  #mob-ov.show { display:block; }
  #mob-btn { display:block !important; }
  .kpi-row { grid-template-columns:repeat(2,1fr) !important; }
  .tbl { font-size:11px; }
  .tbl th,.tbl td { padding:6px 8px; }
  .modal-box { width:calc(100% - 20px) !important; max-width:unset !important; margin:10px; }
  .form-row { grid-template-columns:1fr !important; }
  .admin-stat-grid { grid-template-columns:repeat(2,1fr) !important; }
  /* Groups panel stacks */
  [style*="width:420px"] { width:100% !important; min-width:unset !important; border-left:none !important; border-top:1px solid var(--b1); }
  [style*="display:flex;flex:1;overflow:hidden"] { flex-direction:column !important; }
}
</style>
<script>window.addEventListener("resize",()=>{var b=document.getElementById("mob-btn");if(b)b.style.display=window.innerWidth<=768?"block":"none";});window.addEventListener("load",()=>{var b=document.getElementById("mob-btn");if(b)b.style.display=window.innerWidth<=768?"block":"none";});</script>

</head>

<!-- ADD GROUP MODAL -->
<div id="modal-group" class="modal-ov" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box">
    <div class="modal-title">Нова група</div>
    <div class="form-group">
      <label class="form-label">Назва групи</label>
      <input class="form-input" id="new-group-name" placeholder="Логістика 2026 — Група 1">
    </div>
    <div class="form-group">
      <label class="form-label">Примітки (необов'язково)</label>
      <input class="form-input" id="new-group-notes" placeholder="Коментар...">
    </div>
    <div class="modal-actions">
      <button class="btn primary" style="flex:1" onclick="createGroup()">Створити</button>
      <button class="btn" onclick="document.getElementById('modal-group').style.display='none'">Скасувати</button>
    </div>
  </div>
</div>

<!-- ADD STUDENT MODAL -->
<div id="modal-student" class="modal-ov" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box">
    <div class="modal-title">Додати студента</div>
    <div class="form-group">
      <label class="form-label">Повне ім'я</label>
      <input class="form-input" id="new-st-name" placeholder="Іванов Іван Іванович">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="new-st-email" placeholder="student@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" id="new-st-pass" type="password" placeholder="мін. 8 символів">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn primary" style="flex:1" onclick="addStudent()">Додати</button>
      <button class="btn" onclick="document.getElementById('modal-student').style.display='none'">Скасувати</button>
    </div>
  </div>
</div>

<script>
const API = '/api/lecturer';
let TOKEN = localStorage.getItem('docaa_token');
let USER  = JSON.parse(localStorage.getItem('docaa_user')||'null');
let STATE = { groups:[], selectedGroup:null, students:[], selectedStudent:null, letters:[] };

// ── AUTH CHECK ────────────────────────────────────────────────
if(!TOKEN||!USER){ location.href='/login.html'; }
if(USER.role==='student'){ location.href='/simulator.html'; }
if(USER.role==='superadmin'){ location.href='/superadmin.html'; }
document.getElementById('user-name').textContent = USER.name || 'Лектор';

async function api(method, path, body){
  const res = await fetch(API+path, {
    method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body: body ? JSON.stringify(body) : undefined
  });
  if(res.status===401){ logout(); return null; }
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||'Server error '+res.status);
  return data;
}

// ── NAVIGATION ────────────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('n-'+page)?.classList.add('active');
  const titles={groups:'Групи та студенти',progress:'Прогрес студентів',letters:'Банк листів',rates:'Курс EUR/UAH'};
  document.getElementById('tb-title').textContent=titles[page]||page;
  const renders={groups:renderGroups,progress:renderProgress,letters:renderLetters,rates:renderRates};
  (renders[page]||renderGroups)();
}

// ── GROUPS PAGE ───────────────────────────────────────────────
async function renderGroups(){
  document.getElementById('tb-right').innerHTML=`<button class="btn primary" onclick="document.getElementById('modal-group').style.display='flex'">+ Нова група</button>`;
  document.getElementById('content').innerHTML=`<div style="display:flex;flex:1;overflow:hidden">
    <div style="flex:1;overflow-y:auto;padding:18px" id="groups-main"></div>
    <div id="students-panel" style="width:420px;min-width:380px;border-left:1px solid var(--b1);display:flex;flex-direction:column;background:var(--bg2)">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--t4);font-size:13px;flex-direction:column;gap:8px">
        <div style="font-size:24px;opacity:.2">👥</div><div>Оберіть групу</div>
      </div>
    </div>
  </div>`;

  try{
    STATE.groups = await api('GET','/groups') || [];
    renderGroupsList();
  }catch(e){ notify(e.message,'err'); }
}

function renderGroupsList(){
  const el=document.getElementById('groups-main'); if(!el) return;
  if(!STATE.groups.length){
    el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3)">
      <div style="font-size:32px;margin-bottom:10px">👥</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">Груп ще немає</div>
      <div style="margin-bottom:16px">Створіть першу групу і додайте студентів</div>
      <button class="btn primary" onclick="document.getElementById('modal-group').style.display='flex'">+ Створити групу</button>
    </div>`;
    return;
  }
  el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">
    ${STATE.groups.map(g=>`
      <div class="card" style="cursor:pointer;transition:border-color .15s;border-color:${STATE.selectedGroup?.id===g.id?'var(--acc)':'var(--b1)'}"
        onclick="selectGroup('${g.id}')">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
          <div class="card-title">${g.name}</div>
          <span style="font-size:10px;color:var(--t3)">${g.student_count||0} студ.</span>
        </div>
        ${g.notes?`<div class="card-sub">${g.notes}</div>`:''}
        <div style="margin-top:10px;font-size:11px;color:var(--t3)">Створено: ${g.created_at.slice(0,10)}</div>
      </div>`).join('')}
  </div>`;
}

async function selectGroup(groupId){
  STATE.selectedGroup = STATE.groups.find(g=>g.id===groupId);
  renderGroupsList();
  const panel=document.getElementById('students-panel'); if(!panel) return;
  panel.innerHTML=`<div style="padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
    <div>
      <div style="font-size:14px;font-weight:600">${STATE.selectedGroup.name}</div>
      <div style="font-size:11px;color:var(--t3)">Студенти групи</div>
    </div>
    <button class="btn primary sm" onclick="document.getElementById('modal-student').style.display='flex'">+ Студент</button>
  </div>
  <div style="flex:1;overflow-y:auto" id="students-list">
    <div style="padding:20px;text-align:center;color:var(--t3)">
      <div class="spinner" style="margin:0 auto 10px"></div>Завантаження...
    </div>
  </div>`;

  try{
    STATE.students = await api('GET',`/groups/${groupId}/students`) || [];
    renderStudentsList();
  }catch(e){ notify(e.message,'err'); }
}

function renderStudentsList(){
  const el=document.getElementById('students-list'); if(!el) return;
  if(!STATE.students.length){
    el.innerHTML=`<div style="padding:30px;text-align:center;color:var(--t3)">
      <div style="font-size:22px;margin-bottom:8px">👤</div>
      <div>Студентів ще немає</div>
      <div style="font-size:12px;margin-top:4px">Натисніть "+ Студент" щоб додати</div>
    </div>`;
    return;
  }
  const stIcon={active:'🟢',stopped:'🔴',paused:'🟡',completed:'✅'};
  el.innerHTML=STATE.students.map(st=>{
    const pct=Math.min(100,Math.round((st.profit||0)/1000*100));
    const status=st.sim_status||'new';
    return `<div style="padding:12px 16px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s" onmouseenter="this.style.background='var(--bg3)'" onmouseleave="this.style.background=''" onclick="viewStudentProgress('${st.id}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:13px;font-weight:600;flex:1">${st.name}</span>
        <span style="font-size:12px">${stIcon[status]||'⚪'}</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--acc)">€${st.profit||0}</span>
      </div>
      <div style="margin-bottom:6px">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:11px;color:var(--t3)">${st.email}</span>
        <span style="margin-left:auto;display:flex;gap:4px">
          ${status==='active'||status==='new'
            ?`<button class="btn xs danger" onclick="event.stopPropagation();stopSession('${st.id}')" title="Зупинити">⏸</button>`
            :status==='stopped'
            ?`<button class="btn xs success" onclick="event.stopPropagation();resumeSession('${st.id}')" title="Відновити">▶</button>`:''}
          <button class="btn xs danger" onclick="event.stopPropagation();if(confirm('Скинути прогрес?'))resetSession('${st.id}')" title="Скинути сесію">↺</button>
        </span>
      </div>
    </div>`;
  }).join('');
}

async function createGroup(){
  const name=document.getElementById('new-group-name').value.trim();
  const notes=document.getElementById('new-group-notes').value.trim();
  if(!name){ notify('Введіть назву групи','err'); return; }
  try{
    await api('POST','/groups',{name,notes});
    document.getElementById('modal-group').style.display='none';
    document.getElementById('new-group-name').value='';
    document.getElementById('new-group-notes').value='';
    notify('Групу створено ✓','ok');
    renderGroups();
  }catch(e){ notify(e.message,'err'); }
}

async function addStudent(){
  const name=document.getElementById('new-st-name').value.trim();
  const email=document.getElementById('new-st-email').value.trim();
  const password=document.getElementById('new-st-pass').value;
  if(!name||!email||!password){ notify('Заповніть всі поля','err'); return; }
  if(password.length<8){ notify('Пароль мінімум 8 символів','err'); return; }
  if(!STATE.selectedGroup){ notify('Спочатку оберіть групу','err'); return; }
  try{
    await api('POST',`/groups/${STATE.selectedGroup.id}/students`,{name,email,password});
    document.getElementById('modal-student').style.display='none';
    document.getElementById('new-st-name').value='';
    document.getElementById('new-st-email').value='';
    document.getElementById('new-st-pass').value='';
    notify(`Студента ${name} додано ✓`,'ok');
    selectGroup(STATE.selectedGroup.id);
  }catch(e){ notify(e.message,'err'); }
}

async function stopSession(studentId){
  try{
    await api('POST',`/sessions/${studentId}/stop`);
    notify('Сесію зупинено','warn');
    selectGroup(STATE.selectedGroup.id);
  }catch(e){ notify(e.message,'err'); }
}

async function resumeSession(studentId){
  try{
    await api('POST',`/sessions/${studentId}/resume`);
    notify('Сесію відновлено ✓','ok');
    selectGroup(STATE.selectedGroup.id);
  }catch(e){ notify(e.message,'err'); }
}

async function resetSession(studentId){
  try{
    await api('POST',`/sessions/${studentId}/reset`);
    notify('Сесію скинуто','warn');
    selectGroup(STATE.selectedGroup.id);
  }catch(e){ notify(e.message,'err'); }
}

// ── PROGRESS PAGE ─────────────────────────────────────────────
async function renderProgress(){
  document.getElementById('tb-right').innerHTML=`
    <select id="prog-group-sel" class="form-input" style="width:220px;padding:6px 10px" onchange="loadGroupProgress(this.value)">
      <option value="">Оберіть групу...</option>
      ${STATE.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}
    </select>`;

  document.getElementById('content').innerHTML=`
    <div style="flex:1;overflow-y:auto;padding:18px" id="progress-content">
      <div style="text-align:center;padding:40px;color:var(--t3)">Оберіть групу зверху</div>
    </div>`;

  if(!STATE.groups.length){
    try{ STATE.groups = await api('GET','/groups')||[]; }catch(e){}
    // Re-render select
    document.querySelector('#prog-group-sel').innerHTML=`<option value="">Оберіть групу...</option>${STATE.groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('')}`;
  }
}

async function loadGroupProgress(groupId){
  if(!groupId) return;
  const el=document.getElementById('progress-content'); if(!el) return;
  el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--t3)"><div class="spinner" style="margin:0 auto 10px"></div>Завантаження...</div>`;

  try{
    const students = await api('GET',`/groups/${groupId}/students`)||[];
    if(!students.length){
      el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3)">У цій групі немає студентів</div>`;
      return;
    }

    const totalTarget=1000;
    el.innerHTML=`
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">Студентів</div><div class="kpi-val">${students.length}</div></div>
        <div class="kpi"><div class="kpi-label">Активних</div><div class="kpi-val grn">${students.filter(s=>s.sim_status==='active').length}</div></div>
        <div class="kpi"><div class="kpi-label">Зупинено</div><div class="kpi-val red">${students.filter(s=>s.sim_status==='stopped').length}</div></div>
        <div class="kpi"><div class="kpi-label">Сер. прибуток</div><div class="kpi-val acc">€${Math.round(students.reduce((s,st)=>s+(st.profit||0),0)/students.length)||0}</div></div>
      </div>
      <table class="tbl">
        <thead><tr>
          <th>Студент</th>
          <th>Email</th>
          <th>Статус</th>
          <th>День</th>
          <th class="r">Прибуток</th>
          <th class="r">% мети</th>
          <th>Прогрес</th>
          <th>Дії</th>
        </tr></thead>
        <tbody>
          ${students.map(st=>{
            const pct=Math.min(100,Math.round((st.profit||0)/totalTarget*100));
            const status=st.sim_status||'new';
            const stTag={active:'t-active',stopped:'t-stopped',paused:'t-paused',new:'t-new',completed:'t-active'}[status]||'t-new';
            const stLbl={active:'Активна',stopped:'Зупинено',paused:'Пауза',new:'Не розпочато',completed:'Завершено'}[status]||status;
            return `<tr>
              <td style="font-weight:500">${st.name}</td>
              <td style="color:var(--t3)">${st.email}</td>
              <td><span class="tag ${stTag}">${stLbl}</span></td>
              <td style="font-family:var(--mono)">${st.timer_day||'-'}/5</td>
              <td class="r" style="color:${(st.profit||0)>=totalTarget?'var(--grn)':'var(--t1)'}">€${st.profit||0}</td>
              <td class="r">${pct}%</td>
              <td style="width:120px"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></td>
              <td>
                <div style="display:flex;gap:4px">
                  <button class="btn xs" onclick="viewStudentProgress('${st.id}')">Деталі</button>
                  ${status==='active'
                    ?`<button class="btn xs danger" onclick="stopStudentFromProgress('${st.id}','${groupId}')">Стоп</button>`
                    :status==='stopped'
                    ?`<button class="btn xs success" onclick="resumeStudentFromProgress('${st.id}','${groupId}')">▶</button>`:''}
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }catch(e){ notify(e.message,'err'); }
}

async function stopStudentFromProgress(id, gid){
  try{ await api('POST',`/sessions/${id}/stop`); notify('Зупинено','warn'); loadGroupProgress(gid); }
  catch(e){ notify(e.message,'err'); }
}
async function resumeStudentFromProgress(id, gid){
  try{ await api('POST',`/sessions/${id}/resume`); notify('Відновлено ✓','ok'); loadGroupProgress(gid); }
  catch(e){ notify(e.message,'err'); }
}

async function viewStudentProgress(studentId){
  try{
    const data = await api('GET',`/sessions/${studentId}`);
    if(!data||data.no_session){
      notify('Студент ще не починав симуляцію','warn'); return;
    }

    const mo=document.createElement('div');
    mo.className='modal-ov';
    mo.onclick=e=>{if(e.target===mo)mo.remove();};

    const orders=data.orders||[];
    const student=STATE.students.find(s=>s.id===studentId)||{name:'Студент'};

    mo.innerHTML=`<div class="modal-box" style="max-width:560px;max-height:80vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="modal-title">${student.name} — прогрес</div>
        <button onclick="this.closest('.modal-ov').remove()" style="background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer">×</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
        <div style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--acc)">€${data.session?.profit||0}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">Прибуток</div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--t1)">День ${data.session?.timer_day||1}/5</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">Поточний день</div>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--grn)">${orders.filter(o=>o.carrier_id).length}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">Підтверджено</div>
        </div>
      </div>
      <table class="tbl">
        <thead><tr>
          <th>Замовлення</th><th class="r">Клієнт €</th><th class="r">Перевізн. €</th><th class="r">Маржа</th>
        </tr></thead>
        <tbody>
          ${orders.length ? orders.map(o=>{
            const m=o.client_freight&&o.carrier_freight?o.client_freight-o.carrier_freight:null;
            return `<tr>
              <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${o.letter_id.slice(-6)}</td>
              <td class="r">${o.client_freight?'€'+o.client_freight:'—'}</td>
              <td class="r">${o.carrier_freight?'€'+o.carrier_freight:'—'}</td>
              <td class="r" style="font-weight:600;color:${m===null?'var(--t3)':m>0?'var(--grn)':'var(--red)'}">${m===null?'—':'€'+m}</td>
            </tr>`;
          }).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--t3);padding:16px">Немає підтверджених замовлень</td></tr>'}
        </tbody>
      </table>
    </div>`;
    document.body.appendChild(mo);
  }catch(e){ notify(e.message,'err'); }
}

// ── LETTERS PAGE ──────────────────────────────────────────────
async function renderLetters(){
  document.getElementById('tb-right').innerHTML='';
  document.getElementById('content').innerHTML=`
    <div style="flex:1;overflow-y:auto;padding:18px" id="letters-content">
      <div style="text-align:center;color:var(--t3);padding:20px"><div class="spinner" style="margin:0 auto 10px"></div></div>
    </div>`;
  try{
    STATE.letters = await api('GET','/letters')||[];
    const el=document.getElementById('letters-content'); if(!el) return;
    const byType={complete:[],missing:[],form:[]};
    STATE.letters.forEach(l=>byType[l.type]?.push(l));
    const typeNames={complete:'Повна інформація',missing:'Неповна інформація',form:'Заявка'};
    el.innerHTML=Object.entries(byType).map(([type,letters])=>!letters.length?'':
      `<div style="margin-bottom:20px">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;margin-bottom:10px">${typeNames[type]} (${letters.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">
          ${letters.map(l=>`
            <div class="card" style="padding:12px">
              <div style="display:flex;gap:8px;align-items:start;margin-bottom:6px">
                <span style="font-size:11px;font-family:var(--mono);background:var(--bg4);padding:2px 7px;border-radius:4px;color:var(--acc)">${(JSON.parse(l.dirs||'[]')).join('→')}</span>
                <span style="font-size:11px;color:var(--t3)">${l.vehicle||'—'}</span>
                <span style="margin-left:auto;font-size:10px;color:${l.active?'var(--grn)':'var(--red)'}">${l.active?'Активний':'Вимкнено'}</span>
              </div>
              <div style="font-size:12px;font-weight:500;margin-bottom:2px">${l.from_name} — ${l.company}</div>
              <div style="font-size:11px;color:var(--t3)">${l.subject}</div>
            </div>`).join('')}
        </div>
      </div>`
    ).join('');
    if(!STATE.letters.length){
      el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3)">
        <div style="font-size:28px;margin-bottom:10px">✉</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">Банк листів порожній</div>
        <div>Запустіть: <code style="background:var(--bg4);padding:2px 8px;border-radius:4px;font-family:var(--mono)">node scripts/seed-letters.js</code></div>
      </div>`;
    }
  }catch(e){ notify(e.message,'err'); }
}

// ── RATES PAGE ────────────────────────────────────────────────
async function renderRates(){
  document.getElementById('tb-right').innerHTML=`<button class="btn primary" onclick="saveRates()">💾 Зберегти курси</button>`;
  document.getElementById('content').innerHTML=`
    <div style="flex:1;overflow-y:auto;padding:18px;max-width:500px">
      <div class="card" style="margin-bottom:14px">
        <div class="card-title" style="margin-bottom:4px">Курс EUR/UAH по днях симуляції</div>
        <div class="card-sub" style="margin-bottom:16px">Застосовується до всіх груп де ви є лектором</div>
        ${[1,2,3,4,5].map(d=>`
          <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--b1)">
            <div style="width:64px;font-size:13px;font-weight:500">День ${d}</div>
            <input id="rate-${d}" type="number" step="0.01" class="form-input" style="width:120px"
              placeholder="41.50">
            <span style="font-size:13px;color:var(--t3)">грн / EUR</span>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">Де відображається</div>
        <div class="card-sub">Курс видно студенту у лівій панелі симулятора. Він використовується для розрахунку вартості перевезення в гривнях для українських замовників.</div>
      </div>
    </div>`;
}

async function saveRates(){
  const rates=[1,2,3,4,5].map(d=>parseFloat(document.getElementById('rate-'+d)?.value||0));
  if(rates.some(r=>!r||r<10)){ notify('Введіть правильні курси для всіх 5 днів','err'); return; }
  if(!STATE.selectedGroup){
    // Apply to first group
    if(!STATE.groups.length){ notify('Спочатку створіть групу','err'); return; }
    try{
      for(const g of STATE.groups){
        await api('POST',`/groups/${g.id}/rates`,{rates});
      }
      notify('Курси збережено для всіх груп ✓','ok');
    }catch(e){ notify(e.message,'err'); }
  } else {
    try{
      await api('POST',`/groups/${STATE.selectedGroup.id}/rates`,{rates});
      notify('Курси збережено ✓','ok');
    }catch(e){ notify(e.message,'err'); }
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function notify(msg, type=''){
  const el=document.createElement('div');
  el.className='notif '+(type==='ok'?'ok':type==='err'?'err':'warn');
  el.textContent=msg; document.body.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function logout(){
  localStorage.removeItem('docaa_token');
  localStorage.removeItem('docaa_user');
  location.href='/login.html';
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', async()=>{
  try{
    STATE.groups = await api('GET','/groups')||[];
  }catch(e){}
  showPage('groups');
});
</script>
